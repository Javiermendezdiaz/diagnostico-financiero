services:
  - type: web
    name: diagnostico-financiero-v6
    runtime: python311
    buildCommand: "./build.sh"
    startCommand: "python app_standalone.py"
    envVars:
      - key: NODE_ENV
        value: production
    # Render will auto-detect Node.js requirement from package.json
    # Make sure build.sh handles both npm and pip installs
