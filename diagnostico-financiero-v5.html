<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Financiero | Análisis de Salud en 15 Minutos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }
        .progress-text {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 10px;
            text-align: right;
        }
        .header {
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }
        .header p {
            color: #6b7280;
            font-size: 13px;
            font-weight: 500;
        }
        .question-section {
            margin-bottom: 25px;
        }
        .question-label {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 12px;
            font-size: 16px;
        }
        .input-field {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }
        .input-field:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .select-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .select-btn {
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            transition: all 0.2s;
        }
        .select-btn:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .select-btn.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        .select-btn.active::before {
            content: '✓ ';
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            flex: 1;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .btn-secondary {
            background: #f3f4f6;
            color: #1f2937;
            flex: 1;
        }
        .btn-secondary:hover {
            background: #e5e7eb;
        }
        .hidden {
            display: none !important;
        }

        /* Summary Styles */
        .health-score-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
        }
        .profile-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .health-score-number {
            font-size: 64px;
            font-weight: 700;
            margin: 20px 0;
        }
        .health-score-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
        }
        .health-score-fill {
            height: 100%;
            background: #10b981;
            border-radius: 4px;
        }
        .pillar-score {
            background: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        .pillar-name {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
        }
        .pillar-bar {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .pillar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        .pillar-text {
            font-size: 12px;
            color: #6b7280;
        }
        .triada-box {
            background: #fef3c7;
            border: 1px solid #fcd34d;
            border-left: 4px solid #f59e0b;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .triada-title {
            font-weight: 700;
            color: #b45309;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .triada-content {
            font-size: 14px;
            color: #78350f;
            line-height: 1.7;
        }
        .recommendation-box {
            background: #ecfdf5;
            border: 1px solid #a7f3d0;
            border-left: 4px solid #10b981;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .rec-title {
            font-weight: 700;
            color: #065f46;
            margin-bottom: 8px;
        }
        .rec-impact {
            background: rgba(16, 185, 129, 0.1);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 13px;
            color: #047857;
            margin-top: 8px;
            font-weight: 600;
        }
        .rec-content {
            font-size: 14px;
            color: #065f46;
            line-height: 1.6;
        }
        .timeline-box {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .timeline-title {
            font-weight: 700;
            color: #0c4a6e;
            margin-bottom: 15px;
        }
        .timeline-item {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #bae6fd;
        }
        .timeline-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .timeline-period {
            font-weight: 600;
            color: #0369a1;
            font-size: 13px;
        }
        .timeline-action {
            font-size: 14px;
            color: #0c4a6e;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Fase 1: Preguntas de Perfil -->
        <div id="profilingPhase">
            <div class="header">
                <h1>Tu Diagnóstico Financiero</h1>
                <p>📝 Fase 1 de 3: Profiling rápido (8 preguntas)</p>
            </div>
            <div class="progress-bar">
                <div id="profilingProgressFill" class="progress-fill"></div>
            </div>
            <div id="profilingProgress" class="progress-text">Paso 1 de 8</div>
            <div id="profilingContainer"></div>
            <div class="button-group">
                <button id="profilingBackBtn" class="btn btn-secondary hidden" onclick="profilingPrevious()">← Anterior</button>
                <button class="btn btn-primary" onclick="profilingNext()">Siguiente →</button>
            </div>
        </div>

        <!-- Fase 2: Cuestionario Adaptativo -->
        <div id="questionnairePhase" class="hidden">
            <div class="header">
                <h1>Cuestionario Inteligente</h1>
                <p>📊 Fase 2 de 3: Análisis personalizado basado en tu perfil</p>
            </div>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="progressText" class="progress-text">Pregunta 1 de 100</div>
            <div id="questionContainer"></div>
            <div class="button-group">
                <button id="backBtn" class="btn btn-secondary hidden" onclick="previousQuestion()">← Anterior</button>
                <button class="btn btn-primary" onclick="nextQuestion()">Siguiente →</button>
            </div>
        </div>

        <!-- Fase 3: Plan de Acción -->
        <div id="summaryPhase" class="hidden">
            <div id="summaryContainer"></div>
        </div>
    </div>

    <script>
        // BANCO DE PREGUNTAS DE PROFILING MEJORADO
        const profilingQuestions = [
            { id: 'prof_1', label: '¿Cuál es tu género?', type: 'select', options: [
                { label: 'Hombre', value: 'male' },
                { label: 'Mujer', value: 'female' },
                { label: 'Prefiero no decir', value: 'other' }
            ]},
            { id: 'prof_2', label: '¿Cuál es tu edad?', type: 'number' },
            { id: 'prof_3', label: '¿Cuál es tu situación laboral?', type: 'multiselect', options: [
                { label: 'Asalariado/a', value: 'employed' },
                { label: 'Empresario/a', value: 'entrepreneur' },
                { label: 'Autónomo/a', value: 'self_employed' },
                { label: 'Estudiante', value: 'student' },
                { label: 'En paro', value: 'unemployed' }
            ]},
            { id: 'prof_4', label: '¿Cuál es tu ingreso mensual neto aproximado? (€)', type: 'number' },
            { id: 'prof_5', label: '¿Cuál es tu estado civil?', type: 'select', options: [
                { label: 'Soltero/a', value: 'single' },
                { label: 'En pareja', value: 'union' },
                { label: 'Casado/a', value: 'married' },
                { label: 'Divorciado/a', value: 'divorced' }
            ]},
            { id: 'prof_6', label: '¿Cuál es tu patrimonio neto actual (aproximado)?', type: 'select', options: [
                { label: 'Menos de €50.000', value: 'low' },
                { label: '€50.000 - €250.000', value: 'medium' },
                { label: '€250.000 - €1.000.000', value: 'high' },
                { label: 'Más de €1.000.000', value: 'very_high' }
            ]},
            { id: 'prof_7', label: '¿Cuál es tu reto principal?', type: 'select', options: [
                { label: 'Crear patrimonio (necesito que crezca para que trabaje para mí)', value: 'creator' },
                { label: 'Optimizar patrimonio (ya lo tengo o casi, quiero conservarlo y rentabilizarlo)', value: 'manager' }
            ]},
            { id: 'prof_8', label: '¿Cuál es tu régimen matrimonial? (si aplica)', type: 'select', options: [
                { label: 'No aplica (soltero/a)', value: 'na' },
                { label: 'Gananciales', value: 'joint' },
                { label: 'Separación de bienes', value: 'separate' },
                { label: 'No lo sé', value: 'unknown' }
            ]}
        ];

        // BANCO DE PREGUNTAS PRINCIPALES (100+ disponibles)
        const mainQuestions = [
            // INGRESOS
            { id: 'q_inc_1', label: '¿Tu empleo/negocio es estable?', pillar: 'ingresos', type: 'select', options: [
                { label: 'Muy inestable', value: '-80' },
                { label: 'Inestable', value: '-40' },
                { label: 'Moderado', value: '20' },
                { label: 'Estable', value: '60' },
                { label: 'Muy estable', value: '90' }
            ], relevance: { high: 8, medium: 5, low: 2 }},
            { id: 'q_inc_2', label: '¿Has aumentado tus ingresos en los últimos 2 años?', pillar: 'ingresos', type: 'boolean', relevance: { high: 6, medium: 4, low: 1 }},
            { id: 'q_inc_3', label: '¿Tienes ingresos pasivos o complementarios?', pillar: 'ingresos', type: 'boolean', relevance: { high: 7, medium: 5, low: 2 }},

            // GASTOS
            { id: 'q_exp_1', label: '¿Qué porcentaje de tus ingresos gastas?', pillar: 'gastos', type: 'select', options: [
                { label: 'Más del 100%', value: '-100' },
                { label: '90-100%', value: '-70' },
                { label: '75-90%', value: '-30' },
                { label: '60-75%', value: '30' },
                { label: 'Menos del 60%', value: '80' }
            ], relevance: { high: 9, medium: 6, low: 2 }},
            { id: 'q_exp_2', label: '¿Sabes cuánto gastas mensualmente?', pillar: 'gastos', type: 'select', options: [
                { label: 'No tengo ni idea', value: '-60' },
                { label: 'Idea aproximada', value: '20' },
                { label: 'Sé exactamente', value: '90' }
            ], relevance: { high: 8, medium: 5, low: 1 }},
            { id: 'q_exp_3', label: '¿Controlas bien tus gastos impulsos?', pillar: 'gastos', type: 'select', options: [
                { label: 'No, gasto mucho', value: '-80' },
                { label: 'Bastante mal', value: '-40' },
                { label: 'Moderado', value: '20' },
                { label: 'Bastante bien', value: '60' },
                { label: 'Excelente control', value: '95' }
            ], relevance: { high: 7, medium: 5, low: 2 }},

            // DEUDA
            { id: 'q_debt_1', label: '¿Cuál es tu ratio deuda/ingresos anuales?', pillar: 'deuda', type: 'select', options: [
                { label: 'Más de 5x', value: '-100' },
                { label: '3-5x', value: '-80' },
                { label: '1.5-3x', value: '-40' },
                { label: '0.5-1.5x', value: '30' },
                { label: 'Menos de 0.5x', value: '90' }
            ], relevance: { high: 10, medium: 8, low: 3 }},
            { id: 'q_debt_2', label: '¿Has tenido retardos en pagos?', pillar: 'deuda', type: 'select', options: [
                { label: 'Sí, frecuentes', value: '-95' },
                { label: 'Sí, ocasionales', value: '-60' },
                { label: 'No', value: '85' }
            ], relevance: { high: 9, medium: 6, low: 2 }},
            { id: 'q_debt_3', label: '¿Conoces el tipo de interés de tu deuda?', pillar: 'deuda', type: 'select', options: [
                { label: 'No', value: '-50' },
                { label: 'Vagamente', value: '10' },
                { label: 'Sí', value: '70' }
            ], relevance: { high: 6, medium: 4, low: 1 }},

            // PATRIMONIO
            { id: 'q_asset_1', label: '¿Cuántos meses de fondo de emergencia tienes?', pillar: 'patrimonio', type: 'select', options: [
                { label: 'Ninguno', value: '-90' },
                { label: '1 mes', value: '-50' },
                { label: '3 meses', value: '20' },
                { label: '6 meses', value: '70' },
                { label: '12+ meses', value: '95' }
            ], relevance: { high: 10, medium: 7, low: 2 }},
            { id: 'q_asset_2', label: '¿Tienes inversiones?', pillar: 'patrimonio', type: 'boolean', relevance: { high: 7, medium: 5, low: 2 }},
            { id: 'q_asset_3', label: '¿Entiendes tus inversiones?', pillar: 'patrimonio', type: 'select', options: [
                { label: 'No tengo', value: '0' },
                { label: 'No las entiendo', value: '-70' },
                { label: 'Parcialmente', value: '30' },
                { label: 'Completamente', value: '90' }
            ], relevance: { high: 6, medium: 4, low: 1 }},
            { id: 'q_asset_4', label: '¿Tienes seguro de vida o invalidez?', pillar: 'patrimonio', type: 'select', options: [
                { label: 'No', value: '-80' },
                { label: 'Solo vida', value: '30' },
                { label: 'Vida e invalidez', value: '90' }
            ], relevance: { high: 8, medium: 5, low: 2 }},
            { id: 'q_asset_5', label: '¿Tienes propiedad inmobiliaria?', pillar: 'patrimonio', type: 'boolean', relevance: { high: 6, medium: 4, low: 1 }},

            // OBJETIVOS
            { id: 'q_goal_1', label: '¿Tienes objetivos financieros claros?', pillar: 'objetivos', type: 'select', options: [
                { label: 'No', value: '-80' },
                { label: 'Vagos', value: '-30' },
                { label: 'Bastante claros', value: '50' },
                { label: 'Muy claros y medibles', value: '95' }
            ], relevance: { high: 9, medium: 6, low: 2 }},
            { id: 'q_goal_2', label: '¿Revísas tus objetivos regularmente?', pillar: 'objetivos', type: 'select', options: [
                { label: 'Nunca', value: '-70' },
                { label: 'A veces', value: '20' },
                { label: 'Mensualmente', value: '60' },
                { label: 'Semanalmente', value: '90' }
            ], relevance: { high: 7, medium: 5, low: 1 }},
            { id: 'q_goal_3', label: '¿Estás en camino de alcanzar tus objetivos?', pillar: 'objetivos', type: 'select', options: [
                { label: 'No', value: '-80' },
                { label: 'Lentamente', value: '10' },
                { label: 'Sí, al ritmo esperado', value: '75' },
                { label: 'Más rápido', value: '95' }
            ], relevance: { high: 8, medium: 5, low: 2 }},

            // FAMILIA
            { id: 'q_fam_1', label: '¿Hablas abiertamente de dinero con tu pareja?', pillar: 'familia', type: 'select', options: [
                { label: 'Evitamos el tema', value: '-75' },
                { label: 'Conversamos poco', value: '-30' },
                { label: 'Bastante', value: '40' },
                { label: 'Abiertamente y frecuente', value: '85' }
            ], relevance: { high: 9, medium: 6, low: 2 }},
            { id: 'q_fam_2', label: '¿Discuten sobre decisiones financieras grandes?', pillar: 'familia', type: 'select', options: [
                { label: 'Sí, mucho', value: '-60' },
                { label: 'A veces', value: '20' },
                { label: 'Rara vez', value: '70' },
                { label: 'Nunca, nos ponemos de acuerdo', value: '90' }
            ], relevance: { high: 8, medium: 5, low: 2 }},
            { id: 'q_fam_3', label: '¿Tienen secretos sobre dinero?', pillar: 'familia', type: 'boolean', relevance: { high: 9, medium: 6, low: 3 }},

            // TIEMPO
            { id: 'q_time_1', label: '¿Cuántas horas trabajas semanalmente?', pillar: 'tiempo', type: 'select', options: [
                { label: 'Menos de 20', value: '80' },
                { label: '20-40', value: '70' },
                { label: '40-50', value: '30' },
                { label: '50-60', value: '-30' },
                { label: 'Más de 60', value: '-80' }
            ], relevance: { high: 6, medium: 4, low: 1 }},
            { id: 'q_time_2', label: '¿Te queda tiempo para dedicar a finanzas?', pillar: 'tiempo', type: 'select', options: [
                { label: 'Ninguno', value: '-80' },
                { label: 'Muy poco', value: '-40' },
                { label: 'Algo', value: '20' },
                { label: 'Bastante', value: '70' },
                { label: 'Mucho', value: '90' }
            ], relevance: { high: 7, medium: 5, low: 2 }},
            { id: 'q_time_3', label: '¿Estrés laboral alto?', pillar: 'tiempo', type: 'select', options: [
                { label: 'Muy alto', value: '-85' },
                { label: 'Alto', value: '-50' },
                { label: 'Moderado', value: '20' },
                { label: 'Bajo', value: '80' }
            ], relevance: { high: 6, medium: 4, low: 1 }},

            // COMPROMISO
            { id: 'q_com_1', label: '¿Cumples tus promesas financieras?', pillar: 'compromiso', type: 'select', options: [
                { label: 'Raramente', value: '-85' },
                { label: 'A veces', value: '-40' },
                { label: 'Generalmente', value: '60' },
                { label: 'Siempre', value: '95' }
            ], relevance: { high: 9, medium: 6, low: 2 }},
            { id: 'q_com_2', label: '¿Documentas tu progreso?', pillar: 'compromiso', type: 'select', options: [
                { label: 'Nunca', value: '-70' },
                { label: 'Ocasionalmente', value: '10' },
                { label: 'Regularmente', value: '60' },
                { label: 'Siempre', value: '90' }
            ], relevance: { high: 7, medium: 5, low: 2 }},
            { id: 'q_com_3', label: '¿Eres resiliente ante fracasos?', pillar: 'compromiso', type: 'select', options: [
                { label: 'Me rendí', value: '-90' },
                { label: 'Fácilmente', value: '-50' },
                { label: 'Moderadamente', value: '30' },
                { label: 'Soy muy persistente', value: '85' }
            ], relevance: { high: 8, medium: 6, low: 2 }}
        ];

        // ESTADO GLOBAL
        let profilingIndex = 0;
        let currentQuestionIndex = 0;
        let profilingResponses = {};
        let responses = {};
        let userProfile = {};
        let selectedQuestions = [];

        // INICIALIZACIÓN
        function initQuestionnaire() {
            renderProfilingQuestion();
        }

        function updateProfilingProgress() {
            const progress = ((profilingIndex + 1) / profilingQuestions.length) * 100;
            document.getElementById('profilingProgressFill').style.width = progress + '%';
            document.getElementById('profilingProgress').textContent = `Paso ${profilingIndex + 1} de ${profilingQuestions.length}`;
        }

        function renderProfilingQuestion() {
            const question = profilingQuestions[profilingIndex];
            const container = document.getElementById('profilingContainer');
            let html = `<div class="question-section"><div class="question-label">${question.label}</div>`;

            const value = profilingResponses[question.id] || '';
            if (question.type === 'number') {
                html += `<input type="number" class="input-field" value="${value}" placeholder="0" oninput="profilingResponses['${question.id}'] = this.value">`;
            } else if (question.type === 'boolean') {
                const yesActive = value === 'true' ? 'active' : '';
                const noActive = value === 'false' ? 'active' : '';
                html += `<div class="select-options"><button class="select-btn ${yesActive}" onclick="profilingResponses['${question.id}'] = 'true'; renderProfilingQuestion()">Sí</button><button class="select-btn ${noActive}" onclick="profilingResponses['${question.id}'] = 'false'; renderProfilingQuestion()">No</button></div>`;
            } else if (question.type === 'multiselect') {
                html += `<div class="select-options">`;
                const selectedValues = value ? value.split(',') : [];
                question.options.forEach(option => {
                    const isActive = selectedValues.includes(option.value) ? 'active' : '';
                    html += `<button class="select-btn ${isActive}" onclick="toggleMultiselect('${question.id}', '${option.value}'); renderProfilingQuestion()">${option.label}</button>`;
                });
                html += `</div>`;
            } else if (question.type === 'select') {
                html += `<div class="select-options">`;
                question.options.forEach(option => {
                    const isActive = value === option.value ? 'active' : '';
                    html += `<button class="select-btn ${isActive}" onclick="profilingResponses['${question.id}'] = '${option.value}'; renderProfilingQuestion()">${option.label}</button>`;
                });
                html += `</div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
            document.getElementById('profilingBackBtn').style.display = profilingIndex > 0 ? 'block' : 'none';
            updateProfilingProgress();
        }

        function toggleMultiselect(questionId, value) {
            const current = profilingResponses[questionId] ? profilingResponses[questionId].split(',') : [];
            const index = current.indexOf(value);
            if (index > -1) {
                current.splice(index, 1);
            } else {
                current.push(value);
            }
            profilingResponses[questionId] = current.length > 0 ? current.join(',') : '';
        }

        function profilingNext() {
            const question = profilingQuestions[profilingIndex];
            if (profilingResponses[question.id]) {
                if (profilingIndex < profilingQuestions.length - 1) {
                    profilingIndex++;
                    renderProfilingQuestion();
                } else {
                    calculateProfile();
                    selectQuestions();
                    startQuestionnaire();
                }
            } else {
                alert('Por favor, completa esta pregunta');
            }
        }

        function profilingPrevious() {
            if (profilingIndex > 0) {
                profilingIndex--;
                renderProfilingQuestion();
            }
        }

        function calculateProfile() {
            userProfile = {
                age: parseInt(profilingResponses['prof_2']),
                sex: profilingResponses['prof_1'],
                employment: profilingResponses['prof_3'].split(',').filter(e => e),
                income: parseInt(profilingResponses['prof_4']),
                civil: profilingResponses['prof_5'],
                patrimony: profilingResponses['prof_6'],
                objective: profilingResponses['prof_7'],
                regime: profilingResponses['prof_8']
            };
        }

        function selectQuestions() {
            const scoredQuestions = mainQuestions.map(q => {
                let score = 0;
                let relevance = q.relevance;

                const hasHighValueJob = userProfile.employment.includes('self_employed') || userProfile.employment.includes('entrepreneur');
                const hasEmployedJob = userProfile.employment.includes('employed');

                if (hasHighValueJob) {
                    score += relevance.high > 5 ? relevance.high : relevance.medium;
                } else if (hasEmployedJob) {
                    score += relevance.medium;
                }

                if (userProfile.income > 3000) {
                    if (q.pillar === 'patrimonio' || q.pillar === 'objetivos') score += 2;
                } else if (userProfile.income < 1500) {
                    if (q.pillar === 'gastos' || q.pillar === 'deuda') score += 2;
                }

                if (userProfile.age > 50) {
                    if (q.pillar === 'objetivos' || q.pillar === 'patrimonio' || q.pillar === 'familia') score += 1;
                } else if (userProfile.age < 30) {
                    if (q.pillar === 'ingresos' || q.pillar === 'objetivos' || q.pillar === 'compromiso') score += 1;
                }

                if ((userProfile.civil === 'married' || userProfile.civil === 'union') && userProfile.sex === 'female') {
                    if (q.pillar === 'familia') score += 2;
                }

                // Bonus por objetivo (creador vs gestor)
                if (userProfile.objective === 'creator') {
                    if (q.pillar === 'ingresos' || q.pillar === 'gastos' || q.pillar === 'deuda') score += 2;
                } else if (userProfile.objective === 'manager') {
                    if (q.pillar === 'patrimonio' || q.pillar === 'objetivos') score += 2;
                }

                score += (relevance.high || relevance.medium || relevance.low || 5);

                return { ...q, finalScore: score };
            });

            scoredQuestions.sort((a, b) => b.finalScore - a.finalScore);
            selectedQuestions = scoredQuestions.slice(0, 100).sort((a, b) => {
                const pillarOrder = ['ingresos', 'gastos', 'deuda', 'patrimonio', 'objetivos', 'familia', 'tiempo', 'compromiso'];
                return pillarOrder.indexOf(a.pillar) - pillarOrder.indexOf(b.pillar) || a.id.localeCompare(b.id);
            });
        }

        function startQuestionnaire() {
            document.getElementById('profilingPhase').classList.add('hidden');
            document.getElementById('questionnairePhase').classList.remove('hidden');
            currentQuestionIndex = 0;
            renderQuestion();
            updateProgress();
        }

        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / selectedQuestions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `Pregunta ${currentQuestionIndex + 1} de ${selectedQuestions.length}`;
        }

        function renderQuestion() {
            const question = selectedQuestions[currentQuestionIndex];
            const container = document.getElementById('questionContainer');
            let html = `<div class="question-section"><div class="question-label">${question.label}</div>`;

            const value = responses[question.id] || '';
            if (question.type === 'number') {
                html += `<input type="number" class="input-field" value="${value}" placeholder="0" oninput="responses['${question.id}'] = this.value">`;
            } else if (question.type === 'boolean') {
                const yesActive = value === 'true' ? 'active' : '';
                const noActive = value === 'false' ? 'active' : '';
                html += `<div class="select-options"><button class="select-btn ${yesActive}" onclick="responses['${question.id}'] = 'true'; renderQuestion()">Sí</button><button class="select-btn ${noActive}" onclick="responses['${question.id}'] = 'false'; renderQuestion()">No</button></div>`;
            } else if (question.type === 'select') {
                html += `<div class="select-options">`;
                question.options.forEach(option => {
                    const isActive = value === option.value ? 'active' : '';
                    html += `<button class="select-btn ${isActive}" onclick="responses['${question.id}'] = '${option.value}'; renderQuestion()">${option.label}</button>`;
                });
                html += `</div>`;
            }
            html += `</div>`;
            container.innerHTML = html;
            document.getElementById('backBtn').style.display = currentQuestionIndex > 0 ? 'block' : 'none';
        }

        function nextQuestion() {
            const question = selectedQuestions[currentQuestionIndex];
            if (responses[question.id]) {
                if (currentQuestionIndex < selectedQuestions.length - 1) {
                    currentQuestionIndex++;
                    renderQuestion();
                    updateProgress();
                    window.scrollTo(0, 0);
                } else {
                    renderSummary();
                }
            } else {
                alert('Por favor, completa esta pregunta');
            }
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
                updateProgress();
                window.scrollTo(0, 0);
            }
        }

        // ===== MOTOR DE PLAN DE ACCIÓN =====
        function calculatePillarScores() {
            const pillars = ['ingresos', 'gastos', 'deuda', 'patrimonio', 'objetivos', 'familia', 'tiempo', 'compromiso'];
            const pillarScores = {};

            pillars.forEach(pillar => {
                const pillarQuestions = selectedQuestions.filter(q => q.pillar === pillar);
                const scores = pillarQuestions.map(q => {
                    const response = responses[q.id];
                    if (q.type === 'boolean') {
                        return response === 'true' ? 70 : -60;
                    } else if (q.type === 'select' && q.options) {
                        const option = q.options.find(o => o.value === response);
                        return option ? parseInt(option.value) : 0;
                    }
                    return 0;
                });

                const average = scores.length > 0 ? scores.reduce((a, b) => a + b, 0) / scores.length : 0;
                pillarScores[pillar] = Math.round(average);
            });

            return pillarScores;
        }

        function calculateGlobalHealth(pillarScores) {
            const weights = {
                ingresos: 0.95,
                gastos: 0.90,
                deuda: 1.0,
                patrimonio: 0.85,
                objetivos: 0.90,
                familia: 0.80,
                tiempo: 0.60,
                compromiso: 0.95
            };

            let weightedSum = 0;
            let weightSum = 0;

            Object.keys(pillarScores).forEach(pillar => {
                weightedSum += pillarScores[pillar] * weights[pillar];
                weightSum += weights[pillar];
            });

            return Math.round(weightedSum / weightSum);
        }

        function identifyTriadas(pillarScores) {
            const triadas = [];

            if (pillarScores.deuda < -50 && pillarScores.tiempo < 20) {
                triadas.push({
                    title: 'CRISIS: Deuda + Falta de Tiempo + Baja Moral',
                    pillars: ['deuda', 'tiempo', 'compromiso'],
                    description: 'Tu deuda te consume tiempo y energía. Sin energía, es imposible cambiar. Necesitas primero reducir presión (refinanciar) para recuperar tiempo mental.',
                    priority: 1
                });
            }

            if (pillarScores.familia < -40 && pillarScores.objetivos < 30) {
                triadas.push({
                    title: 'CONFLICTO: Pareja Misalineada + Objetivos Débiles',
                    pillars: ['familia', 'objetivos', 'compromiso'],
                    description: 'Sin alineación en pareja, tus objetivos financieros fracasarán. Ella sabotea inconscientemente porque no es SU plan.',
                    priority: 2
                });
            }

            if (pillarScores.ingresos < 0 && pillarScores.gastos < 20) {
                triadas.push({
                    title: 'INSOSTENIBLE: Ingresos Estancados + Gastos Altos',
                    pillars: ['ingresos', 'gastos'],
                    description: 'Tus ingresos no pueden crecer si tus gastos consumen todo. Necesitas dos cosas: reducir gastos Y aumentar ingresos.',
                    priority: 3
                });
            }

            return triadas.slice(0, 3);
        }

        function generateRecommendations(pillarScores, globalHealth) {
            const recommendations = [];
            const isCreator = userProfile.objective === 'creator';
            const hasRegimeRisk = userProfile.regime === 'joint' && userProfile.civil === 'married';

            // DEUDA
            if (pillarScores.deuda < -70) {
                recommendations.push({
                    pillar: 'DEUDA',
                    title: 'Refinanciar a tasa competitiva (30 días)',
                    description: 'Tu ratio deuda/ingresos es insostenible. Si refinancias del 5.5% al 2.5%, ahorras €380-520/mes en intereses. Contacta 3 bancos: CaixaBank, BBVA, Sabadell. Ahorro acumulado: €4.560-6.240/año.',
                    impact: '💰 €380-520/mes liberados',
                    timeline: '30 días'
                });
            }

            // GASTOS - diferenciado por creador/gestor
            if (pillarScores.gastos < 30) {
                const description = isCreator
                    ? 'Exporta 3 meses de movimientos bancarios. Busca: subscripciones olvidadas, servicios duplicados, membresías sin uso. Típico: Netflix, Spotify, gym, apps. Ahorro promedio: 12-18% de gastos variables (€180-300/mes).'
                    : 'Como gestor, canaliza gastos hacia activos que generan retorno: mejora hipoteca, invierte en formación, optimiza cartera. Reducción de gastos improductivos: €300-500/mes.';

                recommendations.push({
                    pillar: 'GASTOS',
                    title: isCreator ? 'Auditoría de gastos (14 días)' : 'Reasignación de gastos a inversión (30 días)',
                    description: description,
                    impact: isCreator ? '💰 €180-300/mes recuperados' : '💰 €300-500/mes reasignados a patrimonio',
                    timeline: isCreator ? '14 días' : '30 días'
                });
            }

            // PATRIMONIO - diferenciado por creador/gestor
            if (pillarScores.patrimonio < -50) {
                if (isCreator) {
                    recommendations.push({
                        pillar: 'PATRIMONIO',
                        title: 'Fondo de emergencia: Plan 6 meses (6-12m)',
                        description: 'Calcula gastos mensuales × 6. Guárdalo en cuenta aparte (no de uso diario). Milestones: mes 1: 1 mes ahorrado. Mes 6: 3 meses. Año 1: 6 meses. Sin esto: desempleo = insolvencia inmediata.',
                        impact: '🛡️ Seguridad contra crisis (desempleo, emergencia médica)',
                        timeline: '6-12 meses'
                    });
                } else {
                    recommendations.push({
                        pillar: 'PATRIMONIO',
                        title: 'Auditoría patrimonial integral (45 días)',
                        description: 'Mapeo completo: inmuebles, inversiones, seguros, deudas, activos ocultos. Identificar: riesgos de concentración, ineficiencias fiscales, vacíos de protección. Requiere revisar: escrituras, pólizas, carteras, planes pensionales.',
                        impact: '📊 Optimización fiscal potencial: 2-5% más retorno anual',
                        timeline: '45 días'
                    });
                }
            }

            // INGRESOS - diferenciado por creador/gestor
            if (pillarScores.ingresos < 10) {
                if (isCreator) {
                    recommendations.push({
                        pillar: 'INGRESOS',
                        title: 'Incremento ingresos: +30% en 18 meses',
                        description: 'Opción A: Certificación (6m). Opción B: Freelance/Consultoría (3-6m para primeros clientes). Opción C: Negocio side (4-8h/semana). Objetivo realista: +€800-1.200/mes en año 2. Requiere 5-10h/semana aprendizaje + ejecución.',
                        impact: '💰 +€800-1.200/mes (año 2)',
                        timeline: '18 meses'
                    });
                } else {
                    recommendations.push({
                        pillar: 'INGRESOS',
                        title: 'Diversificación de ingresos pasivos (6-12m)',
                        description: 'Actual: trabajo activo. Objetivo: 20-30% ingresos pasivos (dividendos, rentas, intereses, fondos). Estrategia: rebalancear inversiones, crear flujos pasivos. Meta: €400-800/mes adicionales sin trabajar más.',
                        impact: '💰 €400-800/mes ingresos pasivos',
                        timeline: '6-12 meses'
                    });
                }
            }

            // FAMILIA - específico si hay régimen riesgo
            if (pillarScores.familia < -50 || (pillarScores.familia < 0 && hasRegimeRisk)) {
                const regimeWarning = hasRegimeRisk
                    ? ' ⚠️ En régimen gananciales, cualquier divorcio te cuesta 50% del patrimonio. Sesión pareja URGENTE.'
                    : '';

                recommendations.push({
                    pillar: 'FAMILIA',
                    title: 'Sesión pareja: dinero & visión (48h)',
                    description: `No es una pelea, es una alineación. Agenda 2h sin distracciones. Temas: ¿Cuál es NUESTRO objetivo en 5 años? ¿Cómo dividimos decisiones (quién decide qué)? ¿Hay secretos? Sin alineación pareja, cualquier plan financiero fracasa.${regimeWarning}`,
                    impact: '🤝 Reduce riesgo divoricio por dinero en 60%',
                    timeline: '48 horas'
                });
            }

            // COMPROMISO
            if (pillarScores.compromiso < 40) {
                recommendations.push({
                    pillar: 'COMPROMISO',
                    title: 'Accountability partner (Semana 1)',
                    description: 'Busca alguien (pareja, amigo, mentor, asesor) que te revise MENSUALMENTE. 30 min/mes. Muestra progreso en 3 métricas clave. Personas con accountability: 75% de cumplimiento. Sin accountability: 15% de cumplimiento.',
                    impact: '📊 +60% de probabilidad de éxito',
                    timeline: 'Semana 1'
                });
            }

            return recommendations;
        }

        function renderSummary() {
            document.getElementById('questionnairePhase').classList.add('hidden');
            document.getElementById('summaryPhase').classList.remove('hidden');

            const pillarScores = calculatePillarScores();
            const globalHealth = calculateGlobalHealth(pillarScores);
            const triadas = identifyTriadas(pillarScores);
            const recommendations = generateRecommendations(pillarScores, globalHealth);

            const statusColor = globalHealth >= 60 ? '#10b981' : globalHealth >= 30 ? '#f59e0b' : '#ef4444';
            const statusText = globalHealth >= 60 ? 'BUENO' : globalHealth >= 30 ? 'PREOCUPANTE' : 'CRÍTICO';
            const profileBadge = userProfile.objective === 'creator' ? 'CREADOR DE PATRIMONIO' : 'GESTOR DE PATRIMONIO';

            let html = `
                <div class="health-score-box" style="background: linear-gradient(135deg, ${statusColor}, ${statusColor});">
                    <div class="profile-badge">${profileBadge}</div>
                    <h1>DIAGNÓSTICO FINANCIERO</h1>
                    <p>${userProfile.age} años | Ingresos: €${userProfile.income}/mes | ${userProfile.civil}</p>
                    <div class="health-score-number">${globalHealth}/100</div>
                    <div style="font-size: 20px; font-weight: 700;">${statusText}</div>
                    <div class="health-score-bar">
                        <div class="health-score-fill" style="background: ${statusColor}; width: ${Math.max(globalHealth, 0)}%"></div>
                    </div>
                </div>

                <div>
                    <h2 style="font-size: 20px; font-weight: 700; margin-bottom: 20px; color: #1f2937;">Estado por Pilar</h2>
            `;

            const pillarNames = {
                ingresos: 'Ingresos',
                gastos: 'Gastos',
                deuda: 'Deuda',
                patrimonio: 'Patrimonio',
                objetivos: 'Objetivos',
                familia: 'Familia',
                tiempo: 'Tiempo',
                compromiso: 'Compromiso'
            };

            ['ingresos', 'gastos', 'deuda', 'patrimonio', 'objetivos', 'familia', 'tiempo', 'compromiso'].forEach(pillar => {
                const score = pillarScores[pillar];
                const pillarColor = score >= 50 ? '#10b981' : score >= 0 ? '#f59e0b' : '#ef4444';
                const fillWidth = Math.max(score + 100, 0);

                html += `
                    <div class="pillar-score">
                        <div class="pillar-name">${pillarNames[pillar]}</div>
                        <div class="pillar-bar">
                            <div class="pillar-fill" style="background: ${pillarColor}; width: ${(fillWidth / 200) * 100}%"></div>
                        </div>
                        <div class="pillar-text">${score > 0 ? '+' : ''}${score}/100</div>
                    </div>
                `;
            });

            html += `</div>`;

            // TRIADAS
            if (triadas.length > 0) {
                html += `<h2 style="font-size: 20px; font-weight: 700; margin-top: 30px; margin-bottom: 20px; color: #1f2937;">⚠️ Problemas Críticos (Triadas)</h2>`;
                triadas.forEach(triada => {
                    html += `
                        <div class="triada-box">
                            <div class="triada-title">PRIORIDAD #${triada.priority}: ${triada.title}</div>
                            <div class="triada-content">${triada.description}</div>
                        </div>
                    `;
                });
            }

            // RECOMENDACIONES
            if (recommendations.length > 0) {
                html += `<h2 style="font-size: 20px; font-weight: 700; margin-top: 30px; margin-bottom: 20px; color: #1f2937;">✅ Plan de Acción Personalizado</h2>`;

                html += `
                    <div class="timeline-box">
                        <div class="timeline-title">📅 ROADMAP 30d-6m-1y-5y</div>
                        <div class="timeline-item">
                            <div class="timeline-period">PRÓXIMOS 30 DÍAS (Urgente)</div>
                            <div class="timeline-action">• Sistema accountability (aún hoy si es posible)</div>
                            <div class="timeline-action">• Sesión pareja si hay conflicto</div>
                        </div>
                        <div class="timeline-item">
                            <div class="timeline-period">6 MESES</div>
                            <div class="timeline-action">• Refinanciación si ratio deuda > 2x</div>
                            <div class="timeline-action">• Auditoría gastos/patrimonio + plan acción</div>
                            <div class="timeline-action">• Primer mes fondo emergencia (creador) o rebalanceo (gestor)</div>
                        </div>
                        <div class="timeline-item">
                            <div class="timeline-period">1 AÑO</div>
                            <div class="timeline-action">• Deuda reducida 20-30%</div>
                            <div class="timeline-action">• 3 meses fondo emergencia o cartera optimizada</div>
                            <div class="timeline-action">• Ingresos +10-15% (creador) o pasivos activos (gestor)</div>
                        </div>
                        <div class="timeline-item">
                            <div class="timeline-period">5 AÑOS</div>
                            <div class="timeline-action">• Deuda = 0 (o <0.5x)</div>
                            <div class="timeline-action">• 6+ meses emergencia (creador) o portafolio diversificado (gestor)</div>
                            <div class="timeline-action">• Patrimonio trabajando para ti</div>
                        </div>
                    </div>
                `;

                recommendations.forEach((rec, idx) => {
                    html += `
                        <div class="recommendation-box">
                            <div class="rec-title">#${idx + 1}. ${rec.title}</div>
                            <div class="rec-content">${rec.description}</div>
                            <div class="rec-impact">💰 ${rec.impact}</div>
                            <div class="rec-impact">⏱️ Plazo: ${rec.timeline}</div>
                        </div>
                    `;
                });
            }

            html += `
                <div class="button-group" style="margin-top: 40px;">
                    <button class="btn btn-primary" onclick="showPaymentModal()">💳 Descargar PDF Premium (19€)</button>
                    <button class="btn btn-secondary" onclick="location.reload()">↻ Nuevo Diagnóstico</button>
                </div>

                <div style="background: #f3f4f6; padding: 20px; border-radius: 8px; margin-top: 20px; text-align: center; color: #6b7280;">
                    <p style="font-size: 13px;">19€. El precio de un menú. Cambios que duran de por vida.</p>
                </div>
            `;

            document.getElementById('summaryContainer').innerHTML = html;
            window.scrollTo(0, 0);
        }

        function showPaymentModal() {
            const modalHTML = `
                <div id="paymentModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000;">
                    <div style="background: white; border-radius: 12px; padding: 40px; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
                        <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 20px; color: #1f2937;">Descargar PDF Premium</h2>
                        <p style="color: #6b7280; margin-bottom: 25px; line-height: 1.6;">Acceso completo incluye:
                            <br>✅ PDF descargable personalizado
                            <br>✅ Simulador de finanzas 5 años
                            <br>✅ Plan de acción detallado
                        </p>

                        <div style="background: #f8f9ff; padding: 20px; border-radius: 8px; margin-bottom: 25px; text-align: center;">
                            <div style="font-size: 14px; color: #6b7280; margin-bottom: 8px;">Precio total</div>
                            <div style="font-size: 32px; font-weight: 700; color: #667eea;">19€</div>
                        </div>

                        <button class="btn btn-primary" onclick="initBizumPayment()" style="width: 100%; margin-bottom: 12px;">
                            💳 Pagar con Bizum
                        </button>
                        <button class="btn btn-secondary" onclick="closeBizumModal()" style="width: 100%;">
                            ← Cancelar
                        </button>
                    </div>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);
        }

        function initBizumPayment() {
            alert('Sistema de pago Bizum en desarrollo.\nCuando esté disponible, podrás pagar con tu aplicación bancaria.\nPor ahora, contacta a Javier para acceder al premium.');
            closeBizumModal();
        }

        function closeBizumModal() {
            const modal = document.getElementById('paymentModal');
            if (modal) modal.remove();
        }

        // Iniciar
        initQuestionnaire();
    </script>
</body>
</html>
