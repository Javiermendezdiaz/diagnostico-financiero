<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITAP Financial Strategy - Evaluación Patrimonial</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f8fafc; max-width: 500px; margin: 60px auto; padding: 20px; }
        .card { background: #1e293b; padding: 30px; border: 1px solid #334155; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        h1 { font-size: 24px; margin-bottom: 20px; text-align: center; color: #38bdf8; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #94a3b8; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        button { background: #0284c7; color: white; font-weight: bold; border: none; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        button:hover { background: #0369a1; }
        .hidden { display: none; }
        .progress-bar { background: #334155; height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        .progress { background: #38bdf8; height: 100%; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Evaluación Patrimonial Pro</h1>
        
        <div id="step-registro">
            <label>Correo Electrónico</label>
            <input type="email" id="email" placeholder="tu@email.com" required>
            
            <label>Profundidad del Informe</label>
            <select id="tier">
                <option value="1">Diagnóstico Rápido (€19)</option>
                <option value="2">Informe Avanzado Tier 2 (€39)</option>
                <option value="3">Análisis Supremo VIP (€54)</option>
            </select>
            
            <button id="btn-inicio" onclick="iniciarCuestionario()">Comenzar Auditoría →</button>
        </div>

        <div id="step-cuestionario" class="hidden">
            <div class="progress-bar"><div id="progress" class="progress"></div></div>
            <p id="pregunta-texto" style="font-size: 16px; margin-bottom: 20px; font-weight: 500;"></p>
            <button onclick="responderPregunta(5)">5. Eficiencia Óptima / Blindada</button>
            <button onclick="responderPregunta(3)">3. Estable / Conservador</button>
            <button onclick="responderPregunta(1)">1. Exposición Total al Riesgo</button>
        </div>

        <div id="step-pago" class="hidden">
            <h2 style="font-size: 18px; color: #38bdf8; text-align: center; margin-bottom: 10px;">¡Cuestionario Completado!</h2>
            <p style="font-size: 14px; color: #94a3b8; text-align: center; margin-bottom: 20px;">Procesa el pago seguro con Stripe:</p>
            <button id="btn-pagar" onclick="ejecutarPago()">Pagar y Descargar PDF</button>
            <div id="pago-error" style="color: #f87171; font-size: 14px; margin-top: 10px; text-align: center;"></div>
        </div>
    </div>

    <script>
        let currentTier = 1;
        let currentQuestion = 1;
        const totalQuestions = 2;

        // Payment Links de Stripe por tier
        const stripeLinks = {
            1: "https://buy.stripe.com/6oUbJ0dyd38Tgyw7ndfAc01",
            2: "https://buy.stripe.com/eVqfZg79P6l55TS9vlfAc02",
            3: "https://buy.stripe.com/eVq8wO9hXaBl2HGePFfAc00"
        };

        async function iniciarCuestionario() {
            const email = document.getElementById('email').value;
            const tier = document.getElementById('tier').value;
            if(!email) return alert('Por favor introduce tu email');

            currentTier = parseInt(tier);
            const btn = document.getElementById('btn-inicio');
            btn.innerText = "Cargando...";
            btn.disabled = true;

            setTimeout(() => {
                document.getElementById('step-registro').classList.add('hidden');
                document.getElementById('step-cuestionario').classList.remove('hidden');
                mostrarPregunta();
            }, 600);
        }

        function mostrarPregunta() {
            document.getElementById('progress').style.width = `${(currentQuestion / totalQuestions) * 100}%`;
            document.getElementById('pregunta-texto').innerText = currentQuestion === 1 ? 
                "¿Cómo califica la diversificación actual de sus activos frente a la inflación?" : 
                "¿Dispone de una estructura fiscal optimizada para la transmisión de patrimonio?";
        }

        function responderPregunta(valor) {
            if(currentQuestion < totalQuestions) {
                currentQuestion++;
                mostrarPregunta();
            } else {
                document.getElementById('step-cuestionario').classList.add('hidden');
                document.getElementById('step-pago').classList.remove('hidden');
            }
        }

        function ejecutarPago() {
            const btn = document.getElementById('btn-pagar');
            btn.disabled = true;
            btn.innerText = "Redirigiendo al pago...";

            // Redirige al link de Stripe según el tier seleccionado
            window.location.href = stripeLinks[currentTier];
        }
    </script>
</body>
</html>
